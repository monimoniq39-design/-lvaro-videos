<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álvaro Videos App</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json,{'name':'Alvaro Videos','display':'standalone'}">
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; }
        nav { background: #0f0f0f; padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        #player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; }
        #close-btn { background:red; color:white; padding:10px; width:100%; border:none; font-weight:bold; }
    </style>
</head>
<body>
    <nav><h2 style="color:red;margin:0;">Álvaro Videos</h2></nav>
    <div id="player-overlay">
        <button id="close-btn" onclick="document.getElementById('player-overlay').style.display='none'">CERRAR VIDEO</button>
        <iframe id="reproductor" width="100%" height="90%" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="grid" id="grid"></div>

    <script>
        const vids = [
            {id:'dQw4w9WgXcQ', t:'Rick Astley'}, {id:'9bZkp7q19f0', t:'Gangnam Style'},
            {id:'M7lc1UVf-VE', t:'Prueba Google'}, {id:'z4p_YJ7Y_0Y', t:'Prueba Sin Bloqueo'}
        ];
        const g = document.getElementById('grid');
        vids.forEach(v => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><p style="padding:10px">${v.t}</p>`;
            d.onclick = () => {
                document.getElementById('player-overlay').style.display='block';
                document.getElementById('reproductor').src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&playsinline=1`;
            };
            g.appendChild(d);
        });
    </script>
</body>
</html>
